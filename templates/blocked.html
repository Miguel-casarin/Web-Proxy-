<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Acesso Bloqueado</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, sans-serif;
      background: #fee2e2;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 48px 56px;
      text-align: center;
      max-width: 480px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .icon { font-size: 56px; margin-bottom: 16px; }
    h1 { font-size: 24px; color: #991b1b; margin-bottom: 8px; }
    .domain {
      font-family: monospace;
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 6px;
      padding: 6px 14px;
      font-size: 14px;
      color: #7f1d1d;
      margin: 12px 0 20px;
      display: inline-block;
    }
    p { color: #6b7280; font-size: 14px; line-height: 1.6; }
    .badge {
      margin-top: 24px;
      font-size: 11px;
      color: #9ca3af;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🚫</div>
    <h1>Acesso Bloqueado</h1>
    <div class="domain">{{ .Domain }}</div>
    <p>Este site foi bloqueado pela política de acesso da rede.<br>
    Entre em contato com o administrador se acreditar que é um erro.</p>
    <p class="badge">Web Proxy &mdash; FURG C3</p>
  </div>
</body>
</html>
