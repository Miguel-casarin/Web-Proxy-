<!-- Adicionei a meta tag, o que garante que o card não quebre caso seja aberto em telas menores. -->
<!-- Variáveis CSS, facilita muito se você quiser mudar a paleta de cores no futuro, além de deixar o código mais organizado. -->
 
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso Bloqueado</title>
    <style>
        :root {
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --danger: #ef4444;
            --danger-bg: #fef2f2;
            --danger-border: #fecaca;
        }
        
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            background: var(--card-bg);
            max-width: 480px;
            width: 100%;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            padding: 40px;
            text-align: center;
            border-top: 6px solid var(--danger);
        }

        .icon-wrapper {
            background-color: var(--danger-bg);
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
        }

        .icon-wrapper svg {
            width: 40px;
            height: 40px;
            color: var(--danger);
        }

        h1 {
            margin: 0 0 12px;
            font-size: 24px;
            color: var(--text-main);
        }

        p {
            margin: 0 0 24px;
            color: var(--text-muted);
            line-height: 1.5;
        }

        .domain-box {
            background-color: var(--danger-bg);
            border: 1px solid var(--danger-border);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 24px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 16px;
            font-weight: bold;
            color: var(--danger);
            word-break: break-all;
        }

        .footer {
            margin-top: 32px;
            padding-top: 16px;
            border-top: 1px solid #e5e7eb;
            font-size: 13px;
            color: var(--text-muted);
        }
        
        .footer strong {
            color: var(--text-main);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon-wrapper">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
            </svg>
        </div>
        
        <h1>Acesso Restrito</h1>
        
        <p>O acesso a este site foi interrompido pelas políticas de controle de conteúdo da nossa rede.</p>
        
        <div class="domain-box">
            {{.Domain}}
        </div>
        
        <div class="footer">
            Sistemas para Internet 2 &bull; <strong>Web Proxy FURG</strong>
        </div>
    </div>
</body>
</html>
